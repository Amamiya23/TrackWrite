<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TrackWrite 设置页</title>
  <style>
    :root {
      --page: #f9fafc;
      --ink: oklch(18% 0.012 240);
      --muted: oklch(52% 0.01 240);
      --subtle: oklch(62% 0.008 240);
      --line: oklch(90% 0.005 240);
      --panel: #ffffff;
      --panel-2: #f4f5f7;
      --phone: oklch(16% 0.012 240);
      --screen: #f9fafc;
      --nav: oklch(93% 0.005 240);
      --primary: oklch(48% 0.10 240);
      --primary-soft: oklch(93% 0.025 240);
      --pending: oklch(50% 0.10 235);
      --pending-soft: oklch(93% 0.02 235);
      --warn: oklch(58% 0.10 72);
      --warn-soft: oklch(93% 0.025 72);
      --danger: oklch(52% 0.12 24);
      --danger-soft: oklch(93% 0.02 24);
      --display: "Google Sans", "Noto Sans SC", "HarmonyOS Sans SC", system-ui, sans-serif;
      --body: "Noto Sans SC", "MiSans", "Microsoft YaHei UI", system-ui, sans-serif;
      --radius-l: 14px;
      --radius-m: 10px;
      --radius-s: 6px;
      --shadow: 0 20px 48px oklch(16% 0.012 240 / 0.12);
      --ease: cubic-bezier(.2, .8, .2, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background: var(--page);
      color: var(--ink);
      font-family: var(--body);
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    body { padding: 32px; display: grid; place-items: center; }

    button { font: inherit; border: 0; cursor: pointer; }

    svg {
      width: 16px; height: 16px;
      fill: none; stroke: currentColor;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    /* ---- phone frame ---- */
    .phone {
      width: 318px; height: 696px;
      padding: 8px;
      border-radius: 38px;
      background: var(--phone);
      box-shadow: var(--shadow);
    }

    .screen {
      position: relative;
      height: 100%;
      overflow: hidden;
      border-radius: 31px;
      background: var(--screen);
    }

    .camera {
      position: absolute; top: 11px; left: 50%; z-index: 10;
      width: 10px; height: 10px; border-radius: 50%;
      transform: translateX(-50%);
      background: oklch(12% 0.01 238);
      box-shadow: 0 0 0 2px oklch(16% 0.012 240 / 0.25);
    }

    .statusbar {
      height: 36px; padding: 11px 19px 0;
      display: flex; justify-content: space-between;
      color: var(--ink); font: 780 11px/1 var(--display);
    }

    .sys-icons { display: inline-flex; align-items: center; gap: 5px; }

    .signal { width: 15px; height: 10px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; align-items: end; }
    .signal i { display: block; border-radius: 2px; background: currentColor; }
    .signal i:nth-child(1) { height: 3px; opacity: .45; }
    .signal i:nth-child(2) { height: 5px; opacity: .62; }
    .signal i:nth-child(3) { height: 7px; opacity: .82; }
    .signal i:nth-child(4) { height: 10px; }

    .battery { position: relative; width: 18px; height: 9px; border: 1.5px solid currentColor; border-radius: 3px; }
    .battery::after { content: ""; position: absolute; right: -4px; top: 2px; width: 2px; height: 4px; border-radius: 0 2px 2px 0; background: currentColor; }

    /* ---- app layout ---- */
    .app {
      height: calc(100% - 36px);
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }

    .topbar {
      padding: 3px 18px 10px;
      display: flex; align-items: center; justify-content: space-between;
    }

    .title-group { display: grid; gap: 2px; }
    .title-group span { color: var(--muted); font: 760 11px/1.2 var(--display); }
    .title-group strong { color: var(--ink); font: 880 22px/1.05 var(--display); }

    /* ---- settings content ---- */
    .settings-scroll {
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 0 15px 16px;
      scrollbar-width: none;
    }
    .settings-scroll::-webkit-scrollbar { display: none; }

    /* ---- section group ---- */
    .section-label {
      padding: 14px 0 6px;
      color: var(--subtle);
      font: 760 10px/1 var(--display);
      letter-spacing: 0.02em;
    }

    .section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius-l);
      overflow: hidden;
    }

    /* ---- setting row ---- */
    .setting-row {
      padding: 13px 14px;
      display: grid;
      gap: 2px;
      cursor: pointer;
      transition: background .16s var(--ease);
      position: relative;
    }
    .setting-row:active { background: var(--panel-2); }

    .setting-row + .setting-row { border-top: 1px solid var(--line); }

    .setting-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .setting-name {
      color: var(--ink);
      font: 780 13px/1.3 var(--display);
    }

    .setting-value {
      color: var(--muted);
      font: 600 12px/1.3 var(--body);
      text-align: right;
      white-space: nowrap;
    }

    .setting-desc {
      color: var(--subtle);
      font: 500 11px/1.35 var(--body);
    }

    /* ---- chevron ---- */
    .chevron {
      width: 14px; height: 14px;
      color: var(--subtle);
      flex-shrink: 0;
    }

    /* ---- switch ---- */
    .switch-row {
      padding: 13px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    .switch-row + .switch-row { border-top: 1px solid var(--line); }

    .switch-info { display: grid; gap: 2px; flex: 1; min-width: 0; }
    .switch-label { color: var(--ink); font: 780 13px/1.3 var(--display); }
    .switch-desc { color: var(--subtle); font: 500 11px/1.35 var(--body); }

    .switch-track {
      width: 44px; height: 24px; flex-shrink: 0;
      border-radius: 99px;
      background: var(--line);
      position: relative;
      transition: background .2s var(--ease);
      cursor: pointer;
    }
    .switch-track.on { background: var(--primary); }
    .switch-thumb {
      position: absolute; top: 2px; left: 2px;
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--panel);
      box-shadow: 0 1px 3px oklch(16% 0.012 240 / 0.18);
      transition: transform .2s var(--ease);
    }
    .switch-track.on .switch-thumb { transform: translateX(20px); }

    /* ---- stepper ---- */
    .stepper-row {
      padding: 13px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    .stepper-row + .stepper-row { border-top: 1px solid var(--line); }

    .stepper-info { display: grid; gap: 2px; flex: 1; min-width: 0; }
    .stepper-label { color: var(--ink); font: 780 13px/1.3 var(--display); }
    .stepper-desc { color: var(--subtle); font: 500 11px/1.35 var(--body); }

    .stepper-control {
      display: flex; align-items: center; gap: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius-m);
      overflow: hidden;
      flex-shrink: 0;
    }
    .stepper-btn {
      width: 32px; height: 32px;
      display: grid; place-items: center;
      background: var(--panel);
      color: var(--ink);
      transition: background .16s var(--ease);
    }
    .stepper-btn:active { background: var(--panel-2); }
    .stepper-btn.disabled { opacity: .35; cursor: default; }
    .stepper-btn svg { width: 14px; height: 14px; }

    .stepper-val {
      min-width: 44px;
      text-align: center;
      color: var(--ink);
      font: 800 13px/1 var(--display);
      border-left: 1px solid var(--line);
      border-right: 1px solid var(--line);
      padding: 8px 4px;
    }
    .stepper-unit {
      color: var(--subtle);
      font: 600 10px/1 var(--body);
    }

    /* ---- segmented control ---- */
    .segment-row {
      padding: 13px 14px;
      display: grid;
      gap: 8px;
    }
    .segment-row + .segment-row { border-top: 1px solid var(--line); }

    .segment-label { color: var(--ink); font: 780 13px/1.3 var(--display); }
    .segment-desc { color: var(--subtle); font: 500 11px/1.35 var(--body); }

    .segment-control {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius-m);
      overflow: hidden;
    }
    .segment-opt {
      padding: 9px 8px;
      text-align: center;
      color: var(--muted);
      font: 760 12px/1.2 var(--display);
      background: var(--panel);
      transition: background .2s var(--ease), color .2s var(--ease);
    }
    .segment-opt + .segment-opt { border-left: 1px solid var(--line); }
    .segment-opt.active {
      background: var(--primary);
      color: var(--panel);
    }

    /* ---- folder row ---- */
    .folder-row {
      padding: 13px 14px;
      display: grid;
      gap: 6px;
      cursor: pointer;
      transition: background .16s var(--ease);
    }
    .folder-row:active { background: var(--panel-2); }
    .folder-row + .folder-row { border-top: 1px solid var(--line); }

    .folder-top {
      display: flex; justify-content: space-between; align-items: center; gap: 10px;
    }
    .folder-name { color: var(--ink); font: 780 13px/1.3 var(--display); }
    .folder-path {
      color: var(--muted);
      font: 500 11px/1.35 var(--body);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .folder-path.unset { color: var(--warn); }

    /* ---- danger note ---- */
    .danger-note {
      margin: 0 14px 12px;
      padding: 10px 12px;
      border-radius: var(--radius-s);
      background: var(--danger-soft);
      color: var(--danger);
      font: 600 11px/1.4 var(--body);
      display: none;
    }
    .danger-note.visible { display: block; }

    /* ---- bottom nav ---- */
    .nav {
      height: 62px; padding: 7px 24px 10px;
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
      background: var(--nav);
      border-top: 1px solid var(--line);
    }

    .nav-item {
      border-radius: var(--radius-l);
      display: grid; place-items: center; gap: 2px;
      color: var(--muted);
      background: transparent;
      font: 780 10px/1.1 var(--display);
      transition: transform .16s var(--ease), background .16s var(--ease);
    }
    .nav-item:active { transform: scale(.95); }
    .nav-item.active { color: var(--primary); background: var(--primary-soft); }
    .nav-item svg { width: 18px; height: 18px; }

    /* ---- drawer ---- */
    .drawer-scrim {
      position: absolute; inset: 0;
      background: oklch(16% 0.012 240 / 0.38);
      z-index: 20;
      opacity: 0; pointer-events: none;
      transition: opacity .2s var(--ease);
    }
    .drawer-scrim.open { opacity: 1; pointer-events: auto; }

    .drawer {
      position: absolute; left: 0; right: 0; bottom: 0;
      max-height: 360px;
      padding: 10px 16px 16px;
      border-radius: 20px 20px 0 0;
      background: var(--panel);
      border-top: 1px solid var(--line);
      box-shadow: 0 -14px 36px oklch(16% 0.012 240 / 0.10);
      z-index: 21;
      display: grid; grid-template-rows: auto 1fr;
      gap: 12px;
      transform: translateY(100%);
      transition: transform .25s var(--ease);
    }
    .drawer.open { transform: translateY(0); }

    .handle {
      width: 40px; height: 4px;
      margin: 0 auto;
      border-radius: 99px;
      background: oklch(75% 0.008 236);
    }

    .drawer-head {
      display: flex; justify-content: space-between; align-items: center; gap: 12px;
    }
    .drawer-head h3 { color: var(--ink); font: 860 16px/1.2 var(--display); }

    .close {
      width: 36px; height: 36px;
      border-radius: var(--radius-m);
      color: var(--muted);
      background: var(--panel-2);
      display: grid; place-items: center;
    }

    .drawer-list {
      overflow-y: auto;
      display: grid; gap: 6px;
      scrollbar-width: none;
    }
    .drawer-list::-webkit-scrollbar { display: none; }

    .drawer-option {
      padding: 12px 14px;
      border-radius: var(--radius-l);
      background: var(--panel-2);
      border: 1px solid transparent;
      display: flex; justify-content: space-between; align-items: center; gap: 10px;
      cursor: pointer;
      transition: border-color .16s var(--ease);
    }
    .drawer-option:active { border-color: var(--line); }
    .drawer-option.selected {
      border-color: var(--primary);
      background: var(--primary-soft);
    }

    .drawer-option-info { display: grid; gap: 2px; }
    .drawer-option-name { color: var(--ink); font: 800 13px/1.25 var(--display); }
    .drawer-option-desc { color: var(--muted); font: 500 11px/1.35 var(--body); }

    .drawer-check {
      width: 20px; height: 20px; flex-shrink: 0;
      border-radius: 50%;
      border: 2px solid var(--line);
      display: grid; place-items: center;
      transition: border-color .16s var(--ease), background .16s var(--ease);
    }
    .drawer-option.selected .drawer-check {
      border-color: var(--primary);
      background: var(--primary);
    }
    .drawer-check svg { width: 12px; height: 12px; color: var(--panel); opacity: 0; }
    .drawer-option.selected .drawer-check svg { opacity: 1; }

    /* ---- toast ---- */
    .toast {
      position: absolute;
      bottom: 76px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      padding: 8px 16px;
      border-radius: var(--radius-m);
      background: var(--ink);
      color: var(--panel);
      font: 700 12px/1.3 var(--display);
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      z-index: 50;
      transition: opacity .2s var(--ease), transform .2s var(--ease);
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ---- responsive ---- */
    @media (max-width: 420px) {
      body { padding: 0; }
      .phone { width: 100%; height: 100vh; border-radius: 0; box-shadow: none; }
      .screen { border-radius: 0; }
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="screen">
      <div class="camera"></div>
      <div class="statusbar">
        <span>9:41</span>
        <span class="sys-icons">
          <span class="signal"><i></i><i></i><i></i><i></i></span>
          <span class="battery"></span>
        </span>
      </div>

      <div class="app">
        <div class="topbar">
          <div class="title-group">
            <span>TrackWrite</span>
            <strong>设置</strong>
          </div>
        </div>

        <div class="settings-scroll">

          <!-- 通用设置 -->
          <div class="section-label">通用</div>
          <div class="section">
            <div class="setting-row" data-action="open-theme">
              <div class="setting-top">
                <span class="setting-name">外观</span>
                <span style="display:flex;align-items:center;gap:6px;">
                  <span class="setting-value" id="theme-value">跟随系统</span>
                  <svg class="chevron" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
                </span>
              </div>
            </div>
            <div class="setting-row" data-action="open-frequency">
              <div class="setting-top">
                <span class="setting-name">记录频率</span>
                <span style="display:flex;align-items:center;gap:6px;">
                  <span class="setting-value" id="freq-value">均衡</span>
                  <svg class="chevron" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
                </span>
              </div>
              <div class="setting-desc">5 秒 / 8 米，电量与精度兼顾</div>
            </div>
          </div>

          <!-- 照片匹配设置 -->
          <div class="section-label">照片匹配</div>
          <div class="section">
            <div class="stepper-row">
              <div class="stepper-info">
                <span class="stepper-label">相机时间偏移</span>
              </div>
              <div class="stepper-control">
                <button class="stepper-btn" data-stepper="time-offset" data-dir="-1">
                  <svg viewBox="0 0 24 24"><path d="M5 12h14"/></svg>
                </button>
                <span class="stepper-val"><span id="time-offset-val">0</span><span class="stepper-unit"> 分</span></span>
                <button class="stepper-btn" data-stepper="time-offset" data-dir="1">
                  <svg viewBox="0 0 24 24"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
                </button>
              </div>
            </div>
            <div class="stepper-row">
              <div class="stepper-info">
                <span class="stepper-label">最大时间差</span>
              </div>
              <div class="stepper-control">
                <button class="stepper-btn" data-stepper="max-gap" data-dir="-1">
                  <svg viewBox="0 0 24 24"><path d="M5 12h14"/></svg>
                </button>
                <span class="stepper-val"><span id="max-gap-val">5</span><span class="stepper-unit"> 分</span></span>
                <button class="stepper-btn" data-stepper="max-gap" data-dir="1">
                  <svg viewBox="0 0 24 24"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
                </button>
              </div>
            </div>
            <div class="switch-row">
              <div class="switch-info">
                <span class="switch-label">允许使用轨迹起点</span>
              </div>
              <div class="switch-track on" data-switch="use-start">
                <div class="switch-thumb"></div>
              </div>
            </div>
            <div class="switch-row">
              <div class="switch-info">
                <span class="switch-label">允许使用轨迹终点</span>
              </div>
              <div class="switch-track on" data-switch="use-end">
                <div class="switch-thumb"></div>
              </div>
            </div>
          </div>

          <!-- 导出设置 -->
          <div class="section-label">导出</div>
          <div class="section">
            <div class="segment-row">
              <span class="segment-label">默认写入方式</span>
              <div class="segment-control">
                <button class="segment-opt active" data-segment="write-mode" data-value="copy">写入副本</button>
                <button class="segment-opt" data-segment="write-mode" data-value="original">写入原图</button>
              </div>
              <div class="danger-note" id="write-danger">
                写入原图会修改源文件。即使有备份，也建议确认后再操作。
              </div>
            </div>
            <div class="folder-row" data-action="pick-folder">
              <div class="folder-top">
                <span class="folder-name">默认副本文件夹</span>
                <svg class="chevron" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
              </div>
              <span class="folder-path unset" id="folder-path">未设置</span>
            </div>
          </div>

        </div>

        <nav class="nav" aria-label="主导航">
          <button class="nav-item" type="button" aria-label="记录"><svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="7"></circle><circle cx="12" cy="12" r="3"></circle></svg><span>记录</span></button>
          <button class="nav-item" type="button" aria-label="匹配"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 8a2 2 0 0 1 2-2h3l1.5-2h3L15 6h3a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2Z"></path><circle cx="12" cy="13" r="3.2"></circle></svg><span>匹配</span></button>
          <button class="nav-item active" type="button" aria-label="设置" aria-current="page"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8Z"></path><path d="M4 12h2M18 12h2M12 4v2M12 18v2M6.4 6.4l1.4 1.4M16.2 16.2l1.4 1.4M17.6 6.4l-1.4 1.4M7.8 16.2l-1.4 1.4"></path></svg><span>设置</span></button>
        </nav>
      </div>

      <!-- 外观抽屉 -->
      <div class="drawer-scrim" id="theme-scrim"></div>
      <div class="drawer" id="theme-drawer">
        <div class="handle"></div>
        <div class="drawer-head">
          <h3>外观</h3>
          <button class="close" data-close="theme-drawer">
            <svg viewBox="0 0 24 24"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
          </button>
        </div>
        <div class="drawer-list">
          <div class="drawer-option selected" data-drawer="theme" data-value="system">
            <div class="drawer-option-info">
              <span class="drawer-option-name">跟随系统</span>
            </div>
            <span class="drawer-check"><svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg></span>
          </div>
          <div class="drawer-option" data-drawer="theme" data-value="light">
            <div class="drawer-option-info">
              <span class="drawer-option-name">浅色</span>
            </div>
            <span class="drawer-check"><svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg></span>
          </div>
          <div class="drawer-option" data-drawer="theme" data-value="dark">
            <div class="drawer-option-info">
              <span class="drawer-option-name">深色</span>
            </div>
            <span class="drawer-check"><svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg></span>
          </div>
        </div>
      </div>

      <!-- 记录频率抽屉 -->
      <div class="drawer-scrim" id="freq-scrim"></div>
      <div class="drawer" id="freq-drawer">
        <div class="handle"></div>
        <div class="drawer-head">
          <h3>记录频率</h3>
          <button class="close" data-close="freq-drawer">
            <svg viewBox="0 0 24 24"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
          </button>
        </div>
        <div class="drawer-list">
          <div class="drawer-option" data-drawer="freq" data-value="battery">
            <div class="drawer-option-info">
              <span class="drawer-option-name">省电</span>
              <span class="drawer-option-desc">15 秒 / 25 米，适合长途出行</span>
            </div>
            <span class="drawer-check"><svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg></span>
          </div>
          <div class="drawer-option selected" data-drawer="freq" data-value="balanced">
            <div class="drawer-option-info">
              <span class="drawer-option-name">均衡</span>
              <span class="drawer-option-desc">5 秒 / 8 米，电量与精度兼顾</span>
            </div>
            <span class="drawer-check"><svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg></span>
          </div>
          <div class="drawer-option" data-drawer="freq" data-value="precise">
            <div class="drawer-option-info">
              <span class="drawer-option-name">精细</span>
              <span class="drawer-option-desc">2 秒 / 3 米，适合步行或复杂路线</span>
            </div>
            <span class="drawer-check"><svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg></span>
          </div>
        </div>
      </div>

      <div class="toast" id="toast">已保存</div>
    </div>
  </div>

  <script>
    (function () {
      var screen = document.querySelector('.screen');
      var toast = document.getElementById('toast');

      function showToast(msg) {
        toast.textContent = msg || '已保存';
        toast.classList.add('show');
        clearTimeout(showToast._t);
        showToast._t = setTimeout(function () { toast.classList.remove('show'); }, 1600);
      }

      /* ---- drawers ---- */
      function openDrawer(drawerId) {
        var scrim = document.getElementById(drawerId.replace('-drawer', '-scrim'));
        var drawer = document.getElementById(drawerId);
        if (scrim) scrim.classList.add('open');
        if (drawer) drawer.classList.add('open');
      }

      function closeDrawer(drawerId) {
        var scrim = document.getElementById(drawerId.replace('-drawer', '-scrim'));
        var drawer = document.getElementById(drawerId);
        if (scrim) scrim.classList.remove('open');
        if (drawer) drawer.classList.remove('open');
      }

      screen.addEventListener('click', function (e) {
        var action = e.target.closest('[data-action]');
        if (action) {
          var act = action.dataset.action;
          if (act === 'open-theme') openDrawer('theme-drawer');
          else if (act === 'open-frequency') openDrawer('freq-drawer');
          else if (act === 'pick-folder') {
            document.getElementById('folder-path').textContent = 'DCIM / TrackWrite';
            document.getElementById('folder-path').classList.remove('unset');
            showToast('已设置');
          }
        }

        var closeBtn = e.target.closest('[data-close]');
        if (closeBtn) closeDrawer(closeBtn.dataset.close);

        // drawer scrim close
        if (e.target.classList.contains('drawer-scrim')) {
          var id = e.target.id.replace('-scrim', '-drawer');
          closeDrawer(id);
        }
      });

      /* ---- drawer option selection ---- */
      var themeNames = { system: '跟随系统', light: '浅色', dark: '深色' };
      var freqNames = { battery: '省电', balanced: '均衡', precise: '精细' };
      var freqDescs = { battery: '15 秒 / 25 米，适合长途出行', balanced: '5 秒 / 8 米，电量与精度兼顾', precise: '2 秒 / 3 米，适合步行或复杂路线' };

      screen.addEventListener('click', function (e) {
        var opt = e.target.closest('[data-drawer]');
        if (!opt) return;
        var group = opt.dataset.drawer;
        var value = opt.dataset.value;
        var container = opt.closest('.drawer-list');
        if (!container) return;
        container.querySelectorAll('.drawer-option').forEach(function (o) { o.classList.remove('selected'); });
        opt.classList.add('selected');

        if (group === 'theme') {
          document.getElementById('theme-value').textContent = themeNames[value] || value;
          closeDrawer('theme-drawer');
          showToast('已保存');
        } else if (group === 'freq') {
          document.getElementById('freq-value').textContent = freqNames[value] || value;
          var desc = opt.closest('.drawer-option').querySelector('.drawer-option-desc');
          var settingRow = document.querySelector('[data-action="open-frequency"]');
          var settingDesc = settingRow ? settingRow.querySelector('.setting-desc') : null;
          if (settingDesc && desc) settingDesc.textContent = desc.textContent;
          closeDrawer('freq-drawer');
          showToast('已保存');
        }
      });

      /* ---- switches ---- */
      screen.addEventListener('click', function (e) {
        var track = e.target.closest('.switch-track');
        if (!track) return;
        track.classList.toggle('on');
        showToast('已保存');
      });

      /* ---- steppers ---- */
      var stepperState = { 'time-offset': 0, 'max-gap': 5 };
      var stepperLimits = { 'time-offset': [-30, 30], 'max-gap': [1, 30] };

      screen.addEventListener('click', function (e) {
        var btn = e.target.closest('[data-stepper]');
        if (!btn || btn.classList.contains('disabled')) return;
        var name = btn.dataset.stepper;
        var dir = parseInt(btn.dataset.dir, 10);
        var limits = stepperLimits[name];
        if (!limits) return;
        var next = stepperState[name] + dir;
        if (next < limits[0] || next > limits[1]) return;
        stepperState[name] = next;
        document.getElementById(name + '-val').textContent = next;

        // update disabled state
        var row = btn.closest('.stepper-control');
        var btns = row.querySelectorAll('.stepper-btn');
        btns[0].classList.toggle('disabled', next <= limits[0]);
        btns[1].classList.toggle('disabled', next >= limits[1]);
        showToast('已保存');
      });

      /* ---- segmented control ---- */
      screen.addEventListener('click', function (e) {
        var opt = e.target.closest('[data-segment]');
        if (!opt) return;
        var group = opt.dataset.segment;
        var value = opt.dataset.value;
        var control = opt.closest('.segment-control');
        control.querySelectorAll('.segment-opt').forEach(function (o) { o.classList.remove('active'); });
        opt.classList.add('active');

        var dangerNote = document.getElementById('write-danger');
        if (group === 'write-mode') {
          dangerNote.classList.toggle('visible', value === 'original');
        }
        showToast('已保存');
      });
    })();
  </script>
</body>
</html>
