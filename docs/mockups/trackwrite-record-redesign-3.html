
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TrackWrite 记录页重设计</title>
  <style>
    :root {
      --page: #f9fafc;
      --ink: oklch(18% 0.012 240);
      --muted: oklch(52% 0.01 240);
      --subtle: oklch(62% 0.008 240);
      --line: oklch(90% 0.005 240);
      --panel: #ffffff;
      --panel-2: #f4f5f7;
      --phone: oklch(16% 0.012 240);
      --screen: #f9fafc;
      --nav: oklch(93% 0.005 240);
      --primary: oklch(54% 0.14 240);
      --primary-soft: oklch(94% 0.02 240);
      --pending: oklch(50% 0.10 235);
      --pending-soft: oklch(93% 0.02 235);
      --pause: oklch(58% 0.10 72);
      --pause-soft: oklch(93% 0.025 72);
      --danger: oklch(52% 0.12 24);
      --danger-soft: oklch(93% 0.02 24);
      --display: "Google Sans", "Noto Sans SC", "HarmonyOS Sans SC", system-ui, sans-serif;
      --body: "Noto Sans SC", "MiSans", "Microsoft YaHei UI", system-ui, sans-serif;
      --radius-l: 14px;
      --radius-m: 10px;
      --radius-s: 6px;
      --shadow: 0 20px 48px oklch(16% 0.012 240 / 0.12);
      --ease: cubic-bezier(.2, .8, .2, 1);
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--page);
      color: var(--ink);
      font-family: var(--body);
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    body { padding: 32px; }

    button { font: inherit; border: 0; }

    .board {
      max-width: 1320px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(318px, 1fr));
      gap: 22px;
      align-items: start;
    }

    .state-card {
      display: grid;
      justify-items: center;
      gap: 12px;
    }

    .state-label {
      width: min(100%, 318px);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font: 760 13px/1.35 var(--display);
    }

    .state-label b {
      color: var(--ink);
      font-weight: 850;
    }

    .phone {
      width: 318px;
      height: 696px;
      padding: 8px;
      border-radius: 38px;
      background: var(--phone);
      box-shadow: var(--shadow);
    }

    .screen {
      position: relative;
      height: 100%;
      overflow: hidden;
      border-radius: 31px;
      background: var(--screen);
    }

    .camera {
      position: absolute;
      top: 11px;
      left: 50%;
      z-index: 10;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      transform: translateX(-50%);
      background: oklch(12% 0.01 238);
      box-shadow: 0 0 0 2px oklch(16% 0.012 240 / 0.25);
    }

    .statusbar {
      height: 36px;
      padding: 11px 19px 0;
      display: flex;
      justify-content: space-between;
      color: var(--ink);
      font: 780 11px/1 var(--display);
    }

    .sys-icons {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .signal {
      width: 15px;
      height: 10px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      align-items: end;
    }

    .signal i {
      display: block;
      border-radius: 2px;
      background: currentColor;
    }

    .signal i:nth-child(1) { height: 3px; opacity: .45; }
    .signal i:nth-child(2) { height: 5px; opacity: .62; }
    .signal i:nth-child(3) { height: 7px; opacity: .82; }
    .signal i:nth-child(4) { height: 10px; }

    .battery {
      position: relative;
      width: 18px;
      height: 9px;
      border: 1.5px solid currentColor;
      border-radius: 3px;
    }

    .battery::after {
      content: "";
      position: absolute;
      right: -4px;
      top: 2px;
      width: 2px;
      height: 4px;
      border-radius: 0 2px 2px 0;
      background: currentColor;
    }

    .app {
      height: calc(100% - 36px);
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }

    .topbar {
      padding: 3px 18px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .title-group {
      display: grid;
      gap: 2px;
    }

    .title-group span {
      color: var(--muted);
      font: 760 11px/1.2 var(--display);
    }

    .title-group strong {
      color: var(--ink);
      font: 880 22px/1.05 var(--display);
      letter-spacing: 0;
    }

    .icon-button {
      width: 42px;
      height: 42px;
      border-radius: var(--radius-m);
      display: grid;
      place-items: center;
      color: var(--ink);
      background: var(--panel);
      border: 1px solid var(--line);
    }

    .content {
      min-height: 0;
      overflow: hidden;
      padding: 0 15px 12px;
      display: grid;
      align-content: start;
      gap: 10px;
    }

    .proof {
      --tone: var(--primary);
      --tone-soft: var(--primary-soft);
      padding: 16px 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius-l);
      background: var(--panel);
      display: grid;
      gap: 10px;
    }

    .tone-neutral { --tone: var(--muted); --tone-soft: var(--panel-2); }
    .tone-pending { --tone: var(--pending); --tone-soft: var(--pending-soft); }
    .tone-ok { --tone: var(--primary); --tone-soft: var(--primary-soft); }
    .tone-pause { --tone: var(--pause); --tone-soft: var(--pause-soft); }
    .tone-danger { --tone: var(--danger); --tone-soft: var(--danger-soft); }

    .proof-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .state-pill {
      min-height: 28px;
      padding: 4px 10px;
      border-radius: var(--radius-s);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--tone);
      background: var(--tone-soft);
      font: 780 12px/1 var(--display);
      white-space: nowrap;
    }

    .state-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--tone);
    }

    .signal-note {
      color: var(--subtle);
      font: 500 11px/1.3 var(--display);
      text-align: right;
    }

    .proof h2 {
      color: var(--ink);
      font: 780 18px/1.2 var(--display);
      letter-spacing: 0;
    }

    .evidence {
      padding: 10px 12px;
      border-radius: var(--radius-m);
      display: flex;
      gap: 10px;
      align-items: center;
      background: var(--panel-2);
    }

    .evidence-icon {
      width: 28px;
      height: 28px;
      border-radius: var(--radius-s);
      display: grid;
      place-items: center;
      color: var(--muted);
      background: var(--panel);
      flex-shrink: 0;
    }

    svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .evidence strong {
      display: block;
      color: var(--ink);
      font: 700 12px/1.3 var(--display);
    }

    .evidence span {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.3;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 9px;
    }

    .primary,
    .secondary,
    .history-row,
    .sheet-action,
    .nav-item {
      transition: transform .16s var(--ease), background-color .16s var(--ease), opacity .16s var(--ease);
    }

    .primary:active,
    .secondary:active,
    .history-row:active,
    .sheet-action:active,
    .nav-item:active { transform: scale(.98); }

    .primary,
    .secondary {
      min-height: 44px;
      border-radius: var(--radius-m);
      font: 780 14px/1 var(--display);
    }

    .primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: oklch(97% 0.006 174);
      background: var(--tone);
    }

    .secondary {
      min-width: 72px;
      padding: 0 12px;
      color: var(--danger);
      background: var(--danger-soft);
      border: 1px solid oklch(52% 0.12 24 / 0.20);
    }

    .secondary.quiet {
      color: var(--muted);
      background: var(--panel-2);
      border-color: var(--line);
    }

    .track-panel {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius-l);
      background: var(--panel);
      display: grid;
      gap: 12px;
    }

    .track-title {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 12px;
    }

    .track-title strong {
      display: block;
      color: var(--ink);
      font: 850 15px/1.25 var(--display);
      overflow-wrap: anywhere;
    }

    .use-mark {
      flex: 0 0 auto;
      min-height: 28px;
      padding: 6px 9px;
      border-radius: 999px;
      color: var(--primary);
      background: var(--primary-soft);
      font: 850 11px/1 var(--display);
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7px;
    }

    .metric {
      min-height: 58px;
      padding: 9px;
      border-radius: var(--radius-m);
      display: grid;
      align-content: center;
      gap: 4px;
      background: var(--panel-2);
    }

    .metric strong {
      color: var(--ink);
      font: 850 14px/1.2 var(--display);
      font-variant-numeric: tabular-nums;
    }

    .label {
      display: block;
      color: var(--muted);
      font: 720 11px/1.25 var(--display);
    }

    .history-row {
      width: 100%;
      min-height: 56px;
      padding: 11px 13px;
      border: 1px solid var(--line);
      border-radius: var(--radius-l);
      display: grid;
      grid-template-columns: 38px 1fr auto;
      gap: 11px;
      align-items: center;
      text-align: left;
      color: var(--ink);
      background: var(--panel);
    }

    .history-icon {
      width: 38px;
      height: 38px;
      border-radius: var(--radius-m);
      display: grid;
      place-items: center;
      color: var(--muted);
      background: var(--panel-2);
    }

    .history-row strong {
      display: block;
      color: var(--ink);
      font: 850 13px/1.25 var(--display);
    }

    .history-row .history-meta {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.25;
    }

    .nav {
      height: 62px;
      padding: 7px 24px 10px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      background: var(--nav);
      border-top: 1px solid var(--line);
    }

    .nav-item {
      border-radius: var(--radius-l);
      display: grid;
      place-items: center;
      gap: 2px;
      color: var(--muted);
      background: transparent;
      font: 780 10px/1.1 var(--display);
    }

    .nav-item.active {
      color: var(--primary);
      background: var(--primary-soft);
    }

    .nav-item svg {
      width: 18px;
      height: 18px;
    }

    .drawer-scrim {
      position: absolute;
      inset: 0;
      background: oklch(16% 0.012 240 / 0.38);
    }

    .drawer {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      max-height: 455px;
      padding: 10px 16px 16px;
      border-radius: 20px 20px 0 0;
      background: var(--panel);
      border-top: 1px solid var(--line);
      box-shadow: 0 -14px 36px oklch(16% 0.012 240 / 0.10);
    }

    .handle {
      width: 40px;
      height: 4px;
      margin: 0 auto 12px;
      border-radius: 99px;
      background: oklch(75% 0.008 236);
    }

    .drawer-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .drawer-head h3 {
      color: var(--ink);
      font: 860 17px/1.2 var(--display);
    }

    .drawer-head span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
    }

    .close {
      width: 38px;
      height: 38px;
      border-radius: var(--radius-m);
      color: var(--muted);
      background: var(--panel-2);
    }

    .track-list {
      max-height: 330px;
      overflow: auto;
      display: grid;
      gap: 9px;
      scrollbar-width: none;
    }

    .track-item {
      padding: 12px;
      border-radius: var(--radius-l);
      background: var(--panel-2);
      border: 1px solid transparent;
      display: grid;
      gap: 10px;
    }

    .track-item.selected {
      border-color: oklch(48% 0.10 174 / 0.30);
      background: var(--primary-soft);
    }

    .track-main {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: start;
    }

    .track-main strong {
      color: var(--ink);
      font: 850 13px/1.25 var(--display);
    }

    .track-main span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.25;
    }

    .selected-mark {
      min-height: 25px;
      padding: 5px 8px;
      border-radius: 999px;
      color: var(--primary);
      background: var(--primary-soft);
      font: 850 10px/1 var(--display);
      white-space: nowrap;
    }

    .sheet-actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7px;
    }

    .sheet-action {
      min-height: 34px;
      border-radius: var(--radius-m);
      color: var(--ink);
      background: var(--panel-2);
      font: 820 11px/1 var(--display);
    }

    .sheet-action.delete {
      color: var(--danger);
      background: var(--danger-soft);
    }

    .empty-state {
      min-height: 220px;
      border-radius: var(--radius-l);
      display: grid;
      place-items: center;
      padding: 22px;
      text-align: center;
      background: var(--panel-2);
    }

    .empty-state svg {
      width: 28px;
      height: 28px;
      margin-bottom: 14px;
      color: var(--subtle);
    }

    .empty-state strong {
      display: block;
      color: var(--ink);
      font: 850 14px/1.25 var(--display);
    }

    .empty-state span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .toast {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 76px;
      z-index: 12;
      min-height: 42px;
      padding: 12px 14px;
      border-radius: var(--radius-l);
      display: grid;
      place-items: center;
      color: oklch(94% 0.006 236);
      background: oklch(16% 0.012 240 / 0.92);
      font: 820 12px/1.35 var(--display);
      text-align: center;
      opacity: 0;
      transform: translateY(8px);
      animation: toast-in .18s var(--ease) forwards;
    }

    @keyframes toast-in {
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 900px) {
      body { padding: 20px; }
    }

    @media (max-width: 420px) {
      body { padding: 16px 10px; }
      .phone {
        width: min(318px, calc(100vw - 20px));
        height: auto;
        aspect-ratio: 318 / 696;
      }
      .state-label { width: min(318px, calc(100vw - 20px)); }
    }
  </style>
</head>

        tone: 'pause',
        state: '已暂停',
        sync: '暂停于 14:26',
        title: '记录已暂停',
        evidenceIcon: 'pause',
        evidenceTitle: '不会写入新的轨迹点',
        evidenceMeta: 'GPS · 36 秒前',
        primary: '继续',
        secondary: '停止',
        track: '天目山晨拍 · 06/08',
        use: '暂停中',
        points: '428',
        duration: '01:42:18',
        distance: '3.8 km',
        history: '3 条历史轨迹',
        selected: '天目山晨拍'
      },
      {
        label: '权限/定位异常',
        note: '直接给出修复路径',
        tone: 'danger',
        state: '无法记录',
        sync: '定位不可用',
        title: '当前无法记录轨迹',
        evidenceIcon: 'lock',
        evidenceTitle: '缺少定位权限或定位关闭',
        evidenceMeta: '不会生成 GPS 点',
        primary: '打开设置',
        secondary: '稍后',
        secondaryQuiet: true,
        track: '天目山晨拍 · 06/08',
        use: '不可用',
        points: '0',
        duration: '00:00',
        distance: '0.00 km',
        history: '3 条历史轨迹',
        selected: '天目山晨拍'
      },
      {
        label: '历史底部抽屉',
        note: '管理退到需要时',
        tone: 'ok',
        state: '正在记录',
        sync: '刚刚同步',
        title: '正在可靠记录',
        evidenceIcon: 'satellite',
        evidenceTitle: '8 秒前记录到点',
        evidenceMeta: 'GPS · ±4 m',
        primary: '暂停',
        secondary: '停止',
        track: '天目山晨拍 · 06/08',
        use: '可用于匹配',
        points: '428',
        duration: '01:42:18',
        distance: '3.8 km',
        history: '3 条历史轨迹',
        selected: '天目山晨拍',
        drawer: 'list'
      },
      {
        label: '历史空状态',
        note: '不营销，不打扰',
        tone: 'neutral',
        state: '未记录',
        sync: '定位权限正常',
        title: '尚未开始记录',
        evidenceIcon: 'target',
        evidenceTitle: '还没有轨迹点',
        evidenceMeta: '当前设备无已保存轨迹',
        primary: '开始记录',
        secondary: '',
        track: '今日拍摄路线',
        use: '待开始',
        points: '0',
        duration: '00:00',
        distance: '0.00 km',
        history: '0 条历史轨迹',
        selected: '',
        drawer: 'empty'
      }
    ];

    function navItem(iconName, label, active) {
      return `<button class="nav-item ${active ? 'active' : ''}" type="button">${icons[iconName]}<span>${label}</span></button>`;
    }

    function renderDrawer(type) {
      if (!type) return '';
      const body = type === 'empty'
        ? `<div class="empty-state">${icons.empty}<div><strong>还没有保存的轨迹</strong><span>开始一次记录后，它会出现在这里。</span></div></div>`
        : `<div class="track-list">${tracks.map(track => `
            <article class="track-item ${track.selected ? 'selected' : ''}">
              <div class="track-main">
                <div><strong>${track.name}</strong><span>${track.meta}</span></div>
                ${track.selected ? '<span class="selected-mark">当前</span>' : ''}
              </div>
              <div class="sheet-actions">
                <button class="sheet-action" type="button">导出 GPX</button>
                <button class="sheet-action" type="button">重命名</button>
                <button class="sheet-action delete" type="button">删除</button>
              </div>
            </article>`).join('')}</div>`;
      return `
        <div class="drawer-scrim" aria-hidden="true"></div>
        <section class="drawer" aria-label="轨迹历史底部抽屉">
          <div class="handle"></div>
          <div class="drawer-head">
            <div><h3>轨迹历史</h3><span>${type === 'empty' ? '0 条轨迹' : '3 条轨迹 · 当前：天目山晨拍'}</span></div>
            <button class="close" type="button" aria-label="关闭">${icons.close}</button>
          </div>
          ${body}
        </section>`;
    }

    function renderPhone(screen) {
      const quiet = screen.secondaryQuiet ? ' quiet' : '';
      const secondary = screen.secondary ? `<button class="secondary${quiet}" type="button">${screen.secondary}</button>` : '';
      const historyMeta = screen.selected ? `<span class="history-meta">${screen.selected}</span>` : '';
      return `
        <article class="state-card">
          <div class="state-label"><b>${screen.label}</b><span>${screen.note}</span></div>
          <div class="phone">
            <div class="screen">
              <div class="camera" aria-hidden="true"></div>
              <div class="statusbar"><span>14:27</span><span class="sys-icons"><span class="signal"><i></i><i></i><i></i><i></i></span><span>5G</span><span class="battery"></span></span></div>
              <div class="app">
                <header class="topbar">
                  <div class="title-group"><span>TrackWrite</span><strong>记录</strong></div>
                  <button class="icon-button" type="button" aria-label="记录设置">${icons.settings}</button>
                </header>
                <section class="content">
                  <section class="proof tone-${screen.tone}">
                    <div class="proof-head">
                      <span class="state-pill"><span class="state-dot"></span>${screen.state}</span>
                      <span class="signal-note">${screen.sync}</span>
                    </div>
                    <h2>${screen.title}</h2>
                    <div class="evidence">
                      <span class="evidence-icon">${icons[screen.evidenceIcon]}</span>
                      <div><strong>${screen.evidenceTitle}</strong><span>${screen.evidenceMeta}</span></div>
                    </div>
                    <div class="actions">
                      <button class="primary" type="button" data-action="primary">${screen.primary}</button>
                      ${secondary}
                    </div>
                  </section>

                  <section class="track-panel" aria-label="当前轨迹数据">
                    <div class="track-title">
                      <strong>${screen.track}</strong>
                      <span class="use-mark">${screen.use}</span>
                    </div>
                    <div class="metric-grid">
                      <div class="metric"><span class="label">点数</span><strong>${screen.points}</strong></div>
                      <div class="metric"><span class="label">时长</span><strong>${screen.duration}</strong></div>
                      <div class="metric"><span class="label">距离</span><strong>${screen.distance}</strong></div>
                    </div>
                  </section>

                  <button class="history-row" type="button" aria-label="打开轨迹历史">
                    <span class="history-icon">${icons.history}</span>
                    <span><strong>${screen.history}</strong>${historyMeta}</span>
                    ${icons.chevron}
                  </button>
                </section>
                <nav class="nav" aria-label="主导航">
                  ${navItem('record', '记录', true)}
                  ${navItem('photo', '匹配', false)}
                  ${navItem('settings', '设置', false)}
                </nav>
              </div>
              ${renderDrawer(screen.drawer)}
            </div>
          </div>
        </article>`;
    }

    document.getElementById('board').innerHTML = screens.map(renderPhone).join('');

    function showToast(screen, message) {
      const old = screen.querySelector('.toast');
      if (old) old.remove();
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = message;
      screen.appendChild(toast);
      window.setTimeout(() => toast.remove(), 1800);
    }

    function openDrawer(screen, empty) {
      if (!screen.querySelector('.drawer')) {
        screen.insertAdjacentHTML('beforeend', renderDrawer(empty ? 'empty' : 'list'));
      }
    }

    document.addEventListener('click', event => {
      const screen = event.target.closest('.screen');
      if (!screen) return;

      const close = event.target.closest('.close');
      if (close) {
        screen.querySelector('.drawer')?.remove();
        screen.querySelector('.drawer-scrim')?.remove();
        return;
      }

      const history = event.target.closest('.history-row');
      if (history) {
        const isEmpty = history.textContent.includes('0 条');
        openDrawer(screen, isEmpty);
        return;
      }

      const sheetAction = event.target.closest('.sheet-action');
      if (sheetAction) {
        const label = sheetAction.textContent.trim();
        const message = label === '删除' ? '删除前需要再次确认' : label === '导出 GPX' ? 'GPX 导出已准备' : '轨迹名称可在下一步编辑';
        showToast(screen, message);
        return;
      }

      const primary = event.target.closest('.primary');
      if (primary) {
        const label = primary.textContent.trim();
        const message = label === '开始记录' ? '开始后先等待首次 GPS 定位' :
          label === '暂停' ? '已暂停，不会新增轨迹点' :
          label === '继续' ? '继续记录后会写入新轨迹点' :
          label === '打开设置' ? '请开启定位权限和系统定位' :
          label === '重新检查' ? '正在重新检查最近定位点' : '记录状态保持中';
        showToast(screen, message);
        return;
      }

      const secondaryButton = event.target.closest('.secondary');
      if (secondaryButton) {
        const label = secondaryButton.textContent.trim();
        showToast(screen, label === '停止' ? '停止前需要再次确认' : '已保留当前记录状态');
      }
    });
  </script>
</body>
